services:
  # ── Backend (FastAPI + SQLite) ──────────────────────────────────────────────
  - type: web
    name: ai-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/ai_platform.db
      - key: FAISS_INDEX_PATH
        value: ./data/faiss_index
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false                  # Fill this in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4-turbo-preview
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CORS_ORIGINS_STR
        value: https://ai-platform-frontend.onrender.com
    disk:
      name: ai-platform-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health

  # ── Frontend (React static site) ───────────────────────────────────────────
  - type: web
    name: ai-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-platform-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
